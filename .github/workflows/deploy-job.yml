name: Deploy Batch Job

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-job.yml"
      - "Dockerfile.job"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: baseballsite
  REGION: asia-northeast1
  REPOSITORY: seo-analyzer
  IMAGE_NAME: seo-batch-job
  JOB_NAME: seo-fetch-job
  RUNTIME_SERVICE_ACCOUNT: seo-batch-runtime@baseballsite.iam.gserviceaccount.com
  DEPLOYER_SERVICE_ACCOUNT: seo-batch-deployer@baseballsite.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/487178857517/locations/global/workloadIdentityPools/github-actions/providers/seo-analyzer-batch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image
        env:
          IMAGE_URI: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          docker build \
            --file Dockerfile.job \
            --tag "${IMAGE_URI}" \
            .

      - name: Push image
        env:
          IMAGE_URI: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: docker push "${IMAGE_URI}"

      - name: Deploy Cloud Run Job
        env:
          IMAGE_URI: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          gcloud run jobs update "${JOB_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE_URI}" \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --set-env-vars="BATCH_TARGET=all,DRY_RUN=false,DEFAULT_DELAY_DAYS=3,DEFAULT_WINDOW_DAYS=1,BIGQUERY_PROJECT_ID=${PROJECT_ID},BIGQUERY_RAW_DATASET=seo_raw" \
            --set-secrets="GOOGLE_OAUTH_CLIENT_ID=google-oauth-client-id:latest,GOOGLE_OAUTH_CLIENT_SECRET=google-oauth-client-secret:latest,GOOGLE_OAUTH_REFRESH_TOKEN=google-oauth-refresh-token:latest" \
            --max-retries=0 \
            --tasks=1 \
            --task-timeout=600s \
            --cpu=1 \
            --memory=512Mi
